<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In - VisionForge AI</title>

  <link rel="icon" type="image/x-icon" href="Images/favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="Images/favicon.ico">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container container-narrow py-2">
    <a class="navbar-brand" href="index.html">
      <span class="brand-mark">
        <img src="Images/favicon.ico" alt="AI">
      </span>
      VisionForge AI
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navMain"
      aria-controls="navMain"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav ms-auto gap-lg-2 align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Assistant</a></li>
        <li class="nav-item"><a class="nav-link" href="logs.html">Logs</a></li>
        <li class="nav-item">
          <a class="btn btn-sm btn-brand ms-lg-2 active" aria-current="page" href="signin.html">Sign In</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="section pt-4">
  <div class="container container-narrow">
    <div id="root"></div>
  </div>
</main>

<footer class="footer">
  <div class="container container-narrow d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div>© <span id="year"></span> VisionForge AI</div>
    <div class="small text-white-50">Account Access • Saved Logs • Personal Assistant</div>
  </div>
</footer>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/scripts.js"></script>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useMemo, useState, useEffect } = React;

  const SESSION_KEY = "vf_session_token";
  const USER_KEY = "vf_current_user";

  function saveSession(sessionToken, user) {
    localStorage.setItem(SESSION_KEY, sessionToken);
    localStorage.setItem(USER_KEY, JSON.stringify(user));
  }

  function clearSession() {
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(USER_KEY);
  }

  function readSessionToken() {
    return localStorage.getItem(SESSION_KEY) || "";
  }

  function readStoredUser() {
    try {
      const raw = localStorage.getItem(USER_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  }

  function SignInPage() {
    const [mode, setMode] = useState("signin");

    const [login, setLogin] = useState("");
    const [password, setPassword] = useState("");

    const [name, setName] = useState("");
    const [email, setEmail] = useState("");
    const [newLogin, setNewLogin] = useState("");
    const [newPassword, setNewPassword] = useState("");

    const [currentUser, setCurrentUser] = useState(readStoredUser);
    const [status, setStatus] = useState("");
    const [loading, setLoading] = useState(false);

    const passwordStrength = useMemo(() => {
      const value = mode === "signin" ? password : newPassword;
      let score = 0;
      if (value.length >= 6) score++;
      if (value.length >= 10) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;
      return ["Very weak", "Weak", "Okay", "Good", "Strong", "Excellent"][score];
    }, [password, newPassword, mode]);

    useEffect(() => {
      async function checkSession() {
        const token = readSessionToken();

        if (!token) {
          return;
        }

        try {
          const response = await fetch(`/api/auth/me?sessionToken=${encodeURIComponent(token)}`);
          const data = await response.json();

          if (data.success && data.user) {
            setCurrentUser(data.user);
            localStorage.setItem(USER_KEY, JSON.stringify(data.user));
          } else {
            clearSession();
            setCurrentUser(null);
          }
        } catch {
          clearSession();
          setCurrentUser(null);
        }
      }

      checkSession();
    }, []);

    async function handleSignIn(event) {
      event.preventDefault();

      if (!login.trim() || !password) {
        setStatus("Enter your login and password.");
        window.vfToast?.("Enter your login and password.");
        return;
      }

      try {
        setLoading(true);
        setStatus("Signing in...");

        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            login,
            password
          })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Could not sign in.");
        }

        saveSession(data.sessionToken, data.user);
        setCurrentUser(data.user);
        setStatus(`Signed in as ${data.user.name}.`);
        window.vfToast?.("Signed in.");

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 700);
      } catch (error) {
        setStatus(error.message);
        window.vfToast?.(error.message);
      } finally {
        setLoading(false);
      }
    }

    async function handleCreateAccount(event) {
      event.preventDefault();

      if (!name.trim() || !email.trim() || !newLogin.trim() || !newPassword) {
        setStatus("Complete all fields to create your account.");
        window.vfToast?.("Complete all fields.");
        return;
      }

      if (newPassword.length < 6) {
        setStatus("Password must be at least 6 characters.");
        window.vfToast?.("Password must be at least 6 characters.");
        return;
      }

      try {
        setLoading(true);
        setStatus("Creating account...");

        const response = await fetch("/api/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            email,
            login: newLogin,
            password: newPassword
          })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Could not create account.");
        }

        saveSession(data.sessionToken, data.user);
        setCurrentUser(data.user);
        setStatus(`Welcome, ${data.user.name}.`);
        window.vfToast?.("Account created.");

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 800);
      } catch (error) {
        setStatus(error.message);
        window.vfToast?.(error.message);
      } finally {
        setLoading(false);
      }
    }

    async function handleSignOut() {
      const token = readSessionToken();

      try {
        if (token) {
          await fetch("/api/auth/logout", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              sessionToken: token
            })
          });
        }
      } catch {
        // Even if server logout fails, clear local session.
      }

      clearSession();
      setCurrentUser(null);
      setStatus("Signed out.");
      window.vfToast?.("Signed out.");
    }

    if (currentUser) {
      return (
        <>
          <div className="hero-card mb-4">
            <div className="hero-inner">
              <div className="row align-items-center g-4">
                <div className="col-lg-8">
                  <h1 className="mb-2">Welcome back, {currentUser.name}</h1>
                  <p className="mb-0 text-white-50">
                    Your account is active. You can open the assistant, ask questions, and review your saved logs.
                  </p>

                  <div className="mt-3 d-flex gap-2 flex-wrap">
                    <span className="badge rounded-pill text-bg-dark border" style={{borderColor: "rgba(255,255,255,0.18)"}}>
                      {currentUser.login}
                    </span>
                    <span className="badge rounded-pill text-bg-dark border" style={{borderColor: "rgba(255,255,255,0.18)"}}>
                      {currentUser.email}
                    </span>
                  </div>

                  <div className="mt-4 d-flex gap-2 flex-wrap">
                    <a className="btn btn-brand px-4" href="dashboard.html">Open Assistant</a>
                    <a className="btn btn-outline-light px-4" href="logs.html">View My Logs</a>
                    <button className="btn btn-outline-light px-4" type="button" onClick={handleSignOut}>
                      Sign Out
                    </button>
                  </div>
                </div>

                <div className="col-lg-4">
                  <div className="preview preview-fixed">
                    <img src="Images/login-bg.jpg" alt="Account preview" loading="lazy" />
                  </div>
                </div>
              </div>
            </div>
          </div>

          {status && (
            <div className="card-glass">
              <div className="text-white-50">{status}</div>
            </div>
          )}
        </>
      );
    }

    return (
      <>
        <div className="hero-card mb-4">
          <div className="hero-inner">
            <div className="row align-items-center g-4">
              <div className="col-lg-8">
                <h1 className="mb-2">Sign in to VisionForge</h1>
                <p className="mb-0 text-white-50">
                  Access your assistant session and keep your saved analyses connected to your account.
                </p>

                <div className="mt-3 d-flex gap-2 flex-wrap">
                  <span className="badge rounded-pill text-bg-dark border" style={{borderColor: "rgba(255,255,255,0.18)"}}>
                    Personal Logs
                  </span>
                  <span className="badge rounded-pill text-bg-dark border" style={{borderColor: "rgba(255,255,255,0.18)"}}>
                    Saved Sessions
                  </span>
                  <span className="badge rounded-pill text-bg-dark border" style={{borderColor: "rgba(255,255,255,0.18)"}}>
                    Assistant Access
                  </span>
                </div>
              </div>

              <div className="col-lg-4">
                <div className="preview preview-fixed">
                  <img src="Images/login-bg.jpg" alt="Sign in preview" loading="lazy" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div className="row g-4">
          <div className="col-lg-7">
            <div className="card-glass p-4 h-100">
              <div className="d-flex gap-2 mb-4 flex-wrap">
                <button
                  className={mode === "signin" ? "btn btn-brand px-4" : "btn btn-outline-light px-4"}
                  type="button"
                  onClick={() => setMode("signin")}
                >
                  Sign In
                </button>

                <button
                  className={mode === "create" ? "btn btn-brand px-4" : "btn btn-outline-light px-4"}
                  type="button"
                  onClick={() => setMode("create")}
                >
                  Create Account
                </button>
              </div>

              {mode === "signin" ? (
                <form onSubmit={handleSignIn}>
                  <h2 className="h4 mb-3">Sign In</h2>

                  <div className="mb-3">
                    <label className="form-label text-white-50">Login</label>
                    <input
                      className="form-control form-control-dark"
                      placeholder="your_login"
                      value={login}
                      onChange={(e) => setLogin(e.target.value)}
                      autoComplete="username"
                    />
                  </div>

                  <div className="mb-2">
                    <label className="form-label text-white-50">Password</label>
                    <input
                      type="password"
                      className="form-control form-control-dark"
                      placeholder="••••••••"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      autoComplete="current-password"
                    />
                  </div>

                  <div className="small text-white-50 mb-3">
                    Password strength: <span className="text-white">{passwordStrength}</span>
                  </div>

                  <div className="d-flex gap-2 flex-wrap">
                    <button className="btn btn-brand px-4" type="submit" disabled={loading}>
                      {loading ? "Signing In..." : "Sign In"}
                    </button>

                    <button
                      className="btn btn-outline-light px-4"
                      type="button"
                      onClick={() => setMode("create")}
                    >
                      Create Account
                    </button>
                  </div>
                </form>
              ) : (
                <form onSubmit={handleCreateAccount}>
                  <h2 className="h4 mb-3">Create Account</h2>

                  <div className="row g-3">
                    <div className="col-12">
                      <label className="form-label text-white-50">Full Name</label>
                      <input
                        className="form-control form-control-dark"
                        placeholder="Your name"
                        value={name}
                        onChange={(e) => setName(e.target.value)}
                        autoComplete="name"
                      />
                    </div>

                    <div className="col-12">
                      <label className="form-label text-white-50">Email</label>
                      <input
                        type="email"
                        className="form-control form-control-dark"
                        placeholder="you@email.com"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        autoComplete="email"
                      />
                    </div>

                    <div className="col-md-6">
                      <label className="form-label text-white-50">Login</label>
                      <input
                        className="form-control form-control-dark"
                        placeholder="choose_login"
                        value={newLogin}
                        onChange={(e) => setNewLogin(e.target.value)}
                        autoComplete="username"
                      />
                    </div>

                    <div className="col-md-6">
                      <label className="form-label text-white-50">Password</label>
                      <input
                        type="password"
                        className="form-control form-control-dark"
                        placeholder="choose password"
                        value={newPassword}
                        onChange={(e) => setNewPassword(e.target.value)}
                        autoComplete="new-password"
                      />
                    </div>

                    <div className="small text-white-50">
                      Password strength: <span className="text-white">{passwordStrength}</span>
                    </div>

                    <div className="col-12 d-flex gap-2 flex-wrap mt-2">
                      <button className="btn btn-brand px-4" type="submit" disabled={loading}>
                        {loading ? "Creating..." : "Create Account"}
                      </button>

                      <button
                        className="btn btn-outline-light px-4"
                        type="button"
                        onClick={() => setMode("signin")}
                      >
                        Back to Sign In
                      </button>
                    </div>
                  </div>
                </form>
              )}

              {status && (
                <div className="mt-3 small text-white-50" aria-live="polite">
                  {status}
                </div>
              )}
            </div>
          </div>

          <div className="col-lg-5">
            <div className="card-glass p-4 h-100">
              <h2 className="h4 mb-3">Why sign in?</h2>

              <div className="mb-3">
                <div className="fw-semibold">Personal saved logs</div>
                <div className="small text-white-50">
                  Your image analyses and questions are saved under your account.
                </div>
              </div>

              <div className="mb-3">
                <div className="fw-semibold">Consistent assistant history</div>
                <div className="small text-white-50">
                  The logs page can show your own previous interactions instead of everyone’s records.
                </div>
              </div>

              <div className="mb-4">
                <div className="fw-semibold">Clearer testing</div>
                <div className="small text-white-50">
                  Different users can test the assistant while keeping their results separate.
                </div>
              </div>

              <a className="btn btn-outline-light w-100" href="dashboard.html">Continue as Guest</a>
            </div>
          </div>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<SignInPage />);
</script>

</body>
</html>
