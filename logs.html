<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logs - VisionForge AI</title>

  <link rel="icon" href="Images/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color: #fff;
      font-family: system-ui;
    }

    .container-box {
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    table {
      color: white;
    }

    th {
      font-size: 0.9rem;
      color: #aaa;
    }

    td {
      font-size: 0.9rem;
    }

    .tag {
      background: #06b6d4;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      margin-right: 4px;
    }

    .nav-link { color: #ccc !important; }
    .nav-link.active { color: #fff !important; font-weight: bold; }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">VisionForge AI</a>

    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="dashboard.html">Assistant</a>
      <a class="nav-link active" href="logs.html">Logs</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="container-box">
    <h2 class="mb-4">Interaction Logs</h2>

    <table class="table table-dark table-striped">
      <thead>
        <tr>
          <th>Time</th>
          <th>Type</th>
          <th>Query</th>
          <th>Description</th>
          <th>Tags</th>
        </tr>
      </thead>
      <tbody id="logsTable"></tbody>
    </table>

  </div>
</div>

<script>
async function loadLogs() {
  try {
    const res = await fetch("/api/logs");
    const data = await res.json();

    const table = document.getElementById("logsTable");
    table.innerHTML = "";

    data.logs.forEach(log => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${new Date(log.timestamp).toLocaleString()}</td>
        <td>${log.inputType}</td>
        <td>${log.query}</td>
        <td>${log.description}</td>
        <td>${log.tags.map(t => `<span class="tag">${t}</span>`).join("")}</td>
      `;

      table.appendChild(row);
    });

  } catch (err) {
    console.error(err);
  }
}

loadLogs();
</script>

</body>
</html>
